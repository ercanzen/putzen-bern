<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Putzen® — Reinigungsdienst Bern</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html, body { margin: 0; padding: 0; background: #000; color: #fff; min-height: 100%; }
  body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
  ::selection { background: #fff; color: #000; }

  /* ── Liquid glass ─────────────────────────────────── */
  .liquid-glass {
    background: rgba(255, 255, 255, 0.01);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.45) 0%,
      rgba(255, 255, 255, 0.15) 20%,
      rgba(255, 255, 255, 0) 40%,
      rgba(255, 255, 255, 0) 60%,
      rgba(255, 255, 255, 0.15) 80%,
      rgba(255, 255, 255, 0.45) 100%
    );
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  /* ── Headline ────────────────────────────────────── */
  .display {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    letter-spacing: -0.025em;
    line-height: 1;
    color: #fff;
  }
  .display em { font-style: italic; color: #E8C547; }

  /* Animated canvas bg (drifting bokeh) */
  .bg-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
</style>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useEffect, useRef } = React;

/* ── Icons (inline, lucide-style) ───────────────── */
const Icon = ({ children, ...rest }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
       fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...rest}>
    {children}
  </svg>
);
const ArrowRight = (p) => (
  <Icon {...p}><path d="M5 12h14M13 5l7 7-7 7" /></Icon>
);
const SparkleHouse = (p) => (
  <Icon {...p}>
    <path d="M3 11.2L12 4l9 7.2" />
    <path d="M5 10v9h14v-9" />
    <path d="M10 19v-5h4v5" />
    <path d="M19 4l.6 1.4L21 6l-1.4.6L19 8l-.6-1.4L17 6l1.4-.6z" />
  </Icon>
);
const Phone = (p) => (
  <Icon {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z" /></Icon>
);
const Mail = (p) => (
  <Icon {...p}><rect x="2" y="4" width="20" height="16" rx="2" /><path d="m22 7-10 6L2 7" /></Icon>
);
const MapPin = (p) => (
  <Icon {...p}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z" /><circle cx="12" cy="10" r="3" /></Icon>
);

/* ── Animated background ──────────────────────── */
function HeroBg() {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current;
    if (!c) return;
    const ctx = c.getContext('2d');
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    let w = 0, h = 0;
    const resize = () => {
      w = c.clientWidth; h = c.clientHeight;
      c.width = Math.round(w * dpr); c.height = Math.round(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    resize();
    window.addEventListener('resize', resize);

    const palette = [
      { r: 110, g: 224, b: 138 },
      { r: 232, g: 197, b: 71 },
      { r: 168, g: 200, b: 232 },
      { r: 240, g: 230, b: 200 },
    ];
    const orbs = Array.from({ length: 26 }, (_, i) => {
      const depth = Math.random() * 0.9 + 0.1;
      return {
        x: Math.random(), y: Math.random(),
        r: (Math.random() * 200 + 70) * depth,
        depth,
        color: palette[i % palette.length],
        vx: (Math.random() - 0.5) * 0.00008,
        vy: -Math.random() * 0.00014 - 0.00003,
        ph: Math.random() * Math.PI * 2,
        ps: Math.random() * 0.0004 + 0.0002,
      };
    });

    const bubbles = Array.from({ length: 22 }, () => ({
      x: Math.random(), y: Math.random() + 1,
      r: Math.random() * 7 + 2,
      v: Math.random() * 0.00025 + 0.00008,
      sw: Math.random() * Math.PI * 2,
      ss: Math.random() * 0.0008 + 0.0004,
    }));

    let raf = null, t0 = performance.now();
    const tick = (now) => {
      const dt = Math.min(48, now - t0); t0 = now;

      // base
      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, '#06120A');
      grad.addColorStop(1, '#040A06');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      // top light
      const shaft = ctx.createRadialGradient(w * 0.5, h * 0.12, 10, w * 0.5, h * 0.12, Math.max(w, h) * 0.7);
      shaft.addColorStop(0, 'rgba(255, 240, 200, 0.15)');
      shaft.addColorStop(0.5, 'rgba(46, 122, 79, 0.10)');
      shaft.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = shaft;
      ctx.fillRect(0, 0, w, h);

      ctx.globalCompositeOperation = 'lighter';
      for (const o of orbs) {
        o.x += o.vx * dt; o.y += o.vy * dt; o.ph += o.ps * dt;
        if (o.y < -0.2) { o.y = 1.2; o.x = Math.random(); }
        const wx = Math.sin(o.ph) * 18;
        const px = o.x * w + wx, py = o.y * h;
        const c2 = o.color, a = 0.11 + o.depth * 0.15;
        const g = ctx.createRadialGradient(px, py, 0, px, py, o.r);
        g.addColorStop(0, `rgba(${c2.r},${c2.g},${c2.b},${a})`);
        g.addColorStop(0.45, `rgba(${c2.r},${c2.g},${c2.b},${a * 0.35})`);
        g.addColorStop(1, `rgba(${c2.r},${c2.g},${c2.b},0)`);
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(px, py, o.r, 0, Math.PI * 2); ctx.fill();
      }
      for (const b of bubbles) {
        b.y -= b.v * dt; b.sw += b.ss * dt;
        if (b.y < -0.05) { b.y = 1.1; b.x = Math.random(); }
        const px = b.x * w + Math.sin(b.sw) * 16;
        const py = b.y * h;
        const g = ctx.createRadialGradient(px, py, 0, px, py, b.r * 6);
        g.addColorStop(0, 'rgba(255,255,255,0.55)');
        g.addColorStop(0.4, 'rgba(255,255,255,0.12)');
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(px, py, b.r * 6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.beginPath(); ctx.arc(px - b.r * 0.3, py - b.r * 0.3, b.r * 0.35, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalCompositeOperation = 'source-over';

      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={ref} className="bg-canvas" />;
}

function App() {
  return (
    <section className="relative flex min-h-screen flex-col overflow-hidden bg-black">

      {/* BACKGROUND */}
      <HeroBg />

      {/* DARK OVERLAY */}
      <div className="absolute inset-0 bg-black/40 z-[1]" />

      {/* NAVBAR */}
      <nav className="relative z-20 px-6 py-6">
        <div className="liquid-glass mx-auto flex max-w-5xl items-center justify-between rounded-full px-6 py-3">
          {/* LEFT */}
          <div className="flex items-center">
            <div className="flex items-center gap-2">
              <SparkleHouse className="h-6 w-6 text-white" />
              <span className="font-display text-2xl text-white" style={{ fontFamily: "'Instrument Serif', serif" }}>
                Putzen<sup className="text-[10px] align-super ml-px font-sans font-normal text-white/60">®</sup>
              </span>
            </div>

            <div className="ml-8 hidden items-center gap-8 md:flex">
              {['Leistungen', 'Preise', 'Über uns'].map((item) => (
                <button
                  key={item}
                  className="text-sm font-medium text-white/80 transition-colors hover:text-white"
                >
                  {item}
                </button>
              ))}
            </div>
          </div>

          {/* RIGHT */}
          <div className="flex items-center gap-3">
            <button className="hidden sm:block text-sm font-medium text-white">
              Anmelden
            </button>
            <button className="liquid-glass rounded-full px-6 py-2 text-sm font-medium text-white">
              Offerte
            </button>
          </div>
        </div>
      </nav>

      {/* CENTERED HERO IMAGE — woman with cosmic light */}
      <div className="absolute inset-0 z-[2] flex items-center justify-center pointer-events-none">
        <div className="relative" style={{ width: 'min(520px, 70vw)' }}>
          <img
            src="assets/hero-figure.png"
            alt=""
            className="w-full h-auto block"
            style={{
              imageRendering: 'auto',
              filter: 'drop-shadow(0 30px 60px rgba(0,0,0,0.55)) drop-shadow(0 0 80px rgba(232,197,71,0.18))',
            }}
          />
          {/* soft radial glow behind */}
          <div
            className="absolute inset-0 -z-10"
            style={{
              background: 'radial-gradient(ellipse at 50% 30%, rgba(232,197,71,0.18) 0%, rgba(46,122,79,0.08) 35%, transparent 65%)',
              transform: 'scale(1.6)',
              filter: 'blur(20px)',
            }}
          />
        </div>
      </div>

      {/* HERO CONTENT — perfectly centered, ABOVE image */}
      <div className="relative z-[5] flex flex-1 flex-col items-center justify-center px-6 py-12 text-center">

        {/* Eyebrow */}
        <div className="liquid-glass mb-8 rounded-full px-4 py-1.5 flex items-center gap-2 text-[11px] uppercase tracking-[0.18em] text-white/75">
          <span className="inline-block w-1.5 h-1.5 rounded-full bg-[#6EE08A]"></span>
          Verfügbar · Bern &amp; Umgebung
        </div>

        <h1 className="display text-6xl sm:text-7xl md:text-8xl lg:text-9xl">
          Sauber wie ein <em>Schweizer&nbsp;Morgen.</em>
        </h1>

        {/* EMAIL → OFFER */}
        <div className="mt-10 w-full max-w-xl">
          <div className="liquid-glass flex items-center gap-3 rounded-full py-2 pl-6 pr-2">
            <Mail className="h-4 w-4 text-white/60 flex-shrink-0" />
            <input
              type="email"
              placeholder="Ihre E-Mail · Offerte innert 24 Std."
              className="w-full bg-transparent text-white outline-none placeholder:text-white/40 text-sm"
            />
            <button className="rounded-full bg-white p-3 text-black transition-transform hover:scale-105">
              <ArrowRight className="h-5 w-5" />
            </button>
          </div>
        </div>

        {/* SUBTITLE */}
        <p className="mt-6 max-w-xl px-4 text-sm leading-relaxed text-white/85">
          Reinigung von Wohnungen, Büros und Geschäftsräumen — mit eigenem Team,
          ökologischen Mitteln und der Sorgfalt, die man Tag für Tag wirklich sieht.
        </p>

        {/* BUTTONS */}
        <div className="mt-8 flex flex-col sm:flex-row items-center gap-3">
          <button className="liquid-glass rounded-full px-8 py-3 text-sm font-medium text-white transition-colors hover:bg-white/5">
            Unsere Leistungen
          </button>
          <button className="rounded-full bg-white text-black px-8 py-3 text-sm font-medium transition-transform hover:scale-105">
            Termin buchen
          </button>
        </div>

        {/* Trust pips */}
        <div className="mt-10 flex flex-wrap items-center justify-center gap-x-6 gap-y-2 text-[11px] uppercase tracking-[0.16em] text-white/55">
          <span className="inline-flex items-center gap-2">
            <span className="text-[#E8C547] text-[12px] tracking-tight">★★★★★</span>
            4.96 / 5.0 · 412 Bewertungen
          </span>
          <span className="hidden sm:inline opacity-40">·</span>
          <span>Versichert bis CHF 5 Mio.</span>
          <span className="hidden sm:inline opacity-40">·</span>
          <span>Seit 2014</span>
        </div>
      </div>

      {/* SOCIALS / CONTACT */}
      <div className="relative z-10 flex justify-center gap-4 pb-12">
        {[Phone, Mail, MapPin].map((I, i) => (
          <button
            key={i}
            className="liquid-glass rounded-full p-4 text-white/80 transition-all hover:bg-white/5 hover:text-white"
          >
            <I className="h-5 w-5" />
          </button>
        ))}
      </div>
    </section>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
