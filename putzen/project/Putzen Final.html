<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Putzen® — Reinigungsdienst Bern</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html, body { margin: 0; padding: 0; background: #FFFFFF; color: #000000; }
  body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
  html { scroll-behavior: smooth; }
  ::selection { background: #000; color: #fff; }

  /* ── Animations ───────────────────────────────────── */
  @keyframes fade-rise {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-rise         { animation: fade-rise 0.8s ease-out both; }
  .animate-fade-rise-delay   { animation: fade-rise 0.8s ease-out 0.2s both; }
  .animate-fade-rise-delay-2 { animation: fade-rise 0.8s ease-out 0.4s both; }
  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.9s ease, transform 0.9s ease; }
  .reveal.is-visible { opacity: 1; transform: none; }

  /* ── Display ──────────────────────────────────────── */
  .display {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    line-height: 0.95;
    letter-spacing: -2.46px;
    color: #000000;
  }
  .display em { font-style: italic; color: #6F6F6F; }

  .display-md {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    line-height: 0.98;
    letter-spacing: -0.02em;
    color: #000000;
  }
  .display-md em { font-style: italic; color: #6F6F6F; }

  .logo { font-family: 'Instrument Serif', serif; color: #000000; letter-spacing: -0.02em; }

  .nav-link { font-size: 14px; text-decoration: none; transition: color 0.2s ease; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #000000;
    color: #FFFFFF;
    border: none;
    border-radius: 9999px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
    text-decoration: none;
  }
  .btn:hover { transform: scale(1.03); }
  .btn-sm { padding: 10px 22px; font-size: 14px; }
  .btn-md { padding: 14px 28px; font-size: 14px; }
  .btn-lg { padding: 20px 40px; font-size: 16px; }
  .btn-ghost {
    background: transparent;
    color: #000;
    border: 1px solid rgba(0,0,0,0.15);
  }
  .btn-ghost:hover { background: #000; color: #fff; border-color: #000; }

  /* ── Video frame for hero ─────────────────────────── */
  .page-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    background: #FFFFFF;
  }
  .page-bg video {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: bottom;
    display: block;
    opacity: 0;
    transition: none;
  }
  .page-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(243,241,231,0.25) 50%, rgba(243,241,231,0.55) 100%);
  }

  .frost-light {
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
  }
  .frost-cream {
    background: rgba(243, 241, 231, 0.82);
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
  }

  .video-frame {
    position: absolute;
    top: 300px;
    inset: auto 0 0 0;
    overflow: hidden;
    z-index: 0;
    background: transparent;
  }
  .video-frame video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: none;
  }
  .video-overlay {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background: linear-gradient(180deg, #FFFFFF 0%, rgba(255,255,255,0) 18%, rgba(255,255,255,0) 72%, #FFFFFF 100%);
  }

  /* ── Eyebrows / labels ───────────────────────────── */
  .eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: #6F6F6F;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow .dot {
    width: 6px; height: 6px;
    border-radius: 9999px;
    background: #C49A2B;
  }

  /* ── Service cards ───────────────────────────────── */
  .svc-card {
    position: relative;
    padding: 36px 30px 28px;
    background: #FAF8F3;
    border-radius: 22px;
    border: 1px solid rgba(0,0,0,0.06);
    transition: transform 0.4s ease, background 0.4s ease;
    overflow: hidden;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .svc-card:hover { transform: translateY(-4px); }
  .svc-card.dark { background: #0F1A11; color: #fff; }
  .svc-card.dark .eyebrow { color: rgba(255,255,255,0.55); }
  .svc-card.dark .arrow-link { border-color: rgba(255,255,255,0.25); color: #fff; }
  .svc-card h3 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    line-height: 1.04;
    font-size: 32px;
    letter-spacing: -0.01em;
    color: inherit;
  }
  .svc-card p {
    font-size: 14px;
    line-height: 1.55;
    color: #6F6F6F;
    max-width: 360px;
  }
  .svc-card.dark p { color: rgba(255,255,255,0.7); }
  .svc-card .price-row {
    margin-top: auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-top: 24px;
    border-top: 1px solid rgba(0,0,0,0.08);
  }
  .svc-card.dark .price-row { border-color: rgba(255,255,255,0.12); }
  .svc-card .price-row .from {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    color: #6F6F6F;
    letter-spacing: 0.04em;
  }
  .svc-card.dark .price-row .from { color: rgba(255,255,255,0.55); }
  .svc-card .price-row .amount {
    font-family: 'Instrument Serif', serif;
    font-size: 30px;
    line-height: 1;
  }
  .arrow-link {
    width: 38px; height: 38px;
    border-radius: 9999px;
    border: 1px solid rgba(0,0,0,0.18);
    display: grid;
    place-items: center;
    font-size: 14px;
    color: #000;
    transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
  }
  .svc-card:hover .arrow-link { transform: rotate(-45deg); background: #000; color: #fff; border-color: #000; }
  .svc-card.dark:hover .arrow-link { background: #fff; color: #000; border-color: #fff; }
  .badge {
    position: absolute;
    top: 22px; right: 22px;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    background: #C49A2B;
    color: #000;
    padding: 4px 10px;
    border-radius: 9999px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── Stats ───────────────────────────────────────── */
  .stats-section {
    color: #0F1A11;
    background: transparent;
  }
  .stats-section .eyebrow { color: #6B7268; }
  .stat-num {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(64px, 8vw, 120px);
    line-height: 1;
    letter-spacing: -0.02em;
    color: #0F1A11;
  }
  .stat-num em { font-style: italic; color: #2E7A4F; }

  /* ── Process step ────────────────────────────────── */
  .step {
    padding-top: 28px;
    border-top: 1px solid rgba(0,0,0,0.12);
  }
  .step h4 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 30px;
    line-height: 1.05;
    margin: 14px 0 14px;
    letter-spacing: -0.01em;
  }

  /* ── Pricing ─────────────────────────────────────── */
  .pkg {
    padding: 36px 30px;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: transform 0.3s ease;
  }
  .pkg:hover { transform: translateY(-4px); }
  .pkg.featured {
    background: #0F1A11;
    color: #fff;
    border-color: #0F1A11;
  }
  .pkg-name {
    font-family: 'Instrument Serif', serif;
    font-size: 36px;
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .pkg-name em { font-style: italic; color: #6F6F6F; }
  .pkg.featured .pkg-name em { color: #C49A2B; }
  .pkg-desc { font-size: 13px; color: #6F6F6F; line-height: 1.5; min-height: 40px; }
  .pkg.featured .pkg-desc { color: rgba(255,255,255,0.6); }
  .pkg-price {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding: 14px 0;
    border-top: 1px dashed rgba(0,0,0,0.15);
    border-bottom: 1px dashed rgba(0,0,0,0.15);
  }
  .pkg.featured .pkg-price { border-color: rgba(255,255,255,0.18); }
  .pkg-price .currency { font-family: 'Geist Mono', monospace; font-size: 13px; color: #6F6F6F; }
  .pkg.featured .pkg-price .currency { color: rgba(255,255,255,0.55); }
  .pkg-price .amount {
    font-family: 'Instrument Serif', serif;
    font-size: 56px;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .pkg-price .per { font-family: 'Geist Mono', monospace; font-size: 11px; color: #6F6F6F; margin-left: 4px; }
  .pkg.featured .pkg-price .per { color: rgba(255,255,255,0.55); }
  .pkg ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .pkg li { font-size: 13px; line-height: 1.45; display: flex; gap: 10px; align-items: flex-start; }
  .pkg li::before { content: "+"; color: #2E7A4F; font-family: 'Geist Mono', monospace; font-size: 13px; line-height: 1.45; }
  .pkg.featured li::before { color: #C49A2B; }
  .pkg li.x::before { content: "−"; color: #6F6F6F; opacity: 0.5; }
  .pkg li.x { color: #6F6F6F; opacity: 0.6; }
  .pkg.featured li.x { color: rgba(255,255,255,0.4); }
  .pkg .pkg-cta { justify-content: center; margin-top: 8px; }
  .pkg.featured .pkg-cta { background: #C49A2B; color: #0F1A11; }
  .pkg.featured .pkg-cta:hover { background: #fff; color: #0F1A11; }

  /* ── Testimonials ────────────────────────────────── */
  .quote-mark {
    font-family: 'Instrument Serif', serif;
    font-size: 120px;
    color: #C49A2B;
    line-height: 0.4;
    height: 40px;
  }
  .testi-card {
    background: #FAF8F3;
    border-radius: 22px;
    padding: 32px;
    border: 1px solid rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .avatar {
    width: 44px; height: 44px;
    border-radius: 9999px;
    background: linear-gradient(135deg, #C49A2B, #6B7268);
    flex-shrink: 0;
  }

  /* ── FAQ ─────────────────────────────────────────── */
  details.faq {
    border-bottom: 1px solid rgba(0,0,0,0.12);
    padding: 22px 0;
    cursor: pointer;
  }
  details.faq summary {
    list-style: none;
    display: grid;
    grid-template-columns: 32px 1fr 32px;
    gap: 16px;
    align-items: start;
  }
  details.faq summary::-webkit-details-marker { display: none; }
  details.faq .num {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: #6F6F6F;
    padding-top: 6px;
  }
  details.faq h5 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 22px;
    line-height: 1.25;
    letter-spacing: -0.005em;
    margin: 0;
  }
  details.faq .toggle {
    width: 32px; height: 32px;
    border-radius: 9999px;
    border: 1px solid rgba(0,0,0,0.18);
    display: grid;
    place-items: center;
    font-size: 16px;
    transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease;
  }
  details.faq[open] .toggle { transform: rotate(45deg); background: #000; color: #fff; border-color: #000; }
  details.faq .answer {
    margin-top: 14px;
    padding-left: 48px;
    padding-right: 40px;
    font-size: 15px;
    line-height: 1.55;
    color: #4A4F4B;
  }

  /* ── Booking ─────────────────────────────────────── */
  .booking-section {
    color: #0F1A11;
    background: transparent;
  }
  .booking-section .eyebrow { color: #6B7268; }
  .booking-form {
    background: #fff;
    color: #000;
    padding: 32px;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    color: #6F6F6F;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .field input, .field select {
    padding: 12px 14px;
    border: 1px solid rgba(0,0,0,0.15);
    background: #fff;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    color: #000;
  }
  .field input:focus, .field select:focus {
    outline: 2px solid #000;
    outline-offset: -1px;
    border-color: transparent;
  }

  /* ── Footer ─────────────────────────────────────── */
  footer { background: #000; color: #fff; }
  .marquee {
    overflow: hidden;
    border-top: 1px solid rgba(255,255,255,0.12);
    border-bottom: 1px solid rgba(255,255,255,0.12);
    background: #000;
  }
  .marquee-track {
    display: inline-flex;
    gap: 56px;
    padding: 16px 0;
    animation: scroll 38s linear infinite;
    white-space: nowrap;
  }
  @keyframes scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .marquee-item {
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .marquee-item .dot { width: 5px; height: 5px; border-radius: 9999px; background: #C49A2B; }
  .wordmark {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: clamp(120px, 22vw, 360px);
    line-height: 0.85;
    letter-spacing: -0.04em;
    color: rgba(255,255,255,0.06);
    text-align: center;
    user-select: none;
    margin: 64px 0 32px;
  }
  .wordmark em { font-style: italic; color: rgba(255,255,255,0.04); }

  /* ─────────────────────────────────────────────── */
  /* Phase 2: Boost — sticky nav, trust bar, pullquote, team, calc, fab */
  /* ─────────────────────────────────────────────── */

  /* Sticky nav state */
  .nav-wrap {
    position: sticky;
    top: 12px;
    z-index: 50;
    margin: 0 auto;
    transition: padding 0.3s ease;
  }
  .nav-inner {
    transition: background 0.3s ease, backdrop-filter 0.3s ease, box-shadow 0.3s ease, max-width 0.3s ease, padding 0.3s ease, border-radius 0.3s ease, border-color 0.3s ease;
    border-radius: 9999px;
    border: 1px solid transparent;
  }
  .nav-wrap.scrolled .nav-inner {
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    box-shadow: 0 8px 30px rgba(15,26,17,0.08);
    border-color: rgba(15,26,17,0.06);
    padding: 10px 18px !important;
  }

  /* Trust bar */
  .trust-bar { padding: 28px 0; border-top: 1px solid rgba(15,26,17,0.10); border-bottom: 1px solid rgba(15,26,17,0.10); }
  .trust-bar .label {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: #6F6F6F;
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }
  .trust-logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #4A4F4B;
    transition: color 0.25s ease, transform 0.25s ease;
    font-size: 13px;
    font-weight: 500;
  }
  .trust-logo:hover { color: #0F1A11; transform: translateY(-1px); }
  .trust-logo svg { width: 22px; height: 22px; }

  /* Pull-quote */
  .pullquote-section { padding: 80px 0 100px; }
  .pullquote {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    line-height: 1.04;
    letter-spacing: -1.5px;
    color: #0F1A11;
    font-size: clamp(40px, 6vw, 92px);
    text-align: center;
    max-width: 1100px;
    margin: 0 auto;
  }
  .pullquote .accent { color: #2E7A4F; }
  .pullquote-meta {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: #6F6F6F;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-top: 32px;
    text-align: center;
  }

  /* Team */
  .team-card {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(15,26,17,0.08);
    border-radius: 22px;
    padding: 24px;
    transition: transform 0.3s ease, background 0.3s ease;
  }
  .team-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.85); }
  .team-photo {
    width: 100%;
    aspect-ratio: 4/5;
    border-radius: 16px;
    overflow: hidden;
    background: linear-gradient(135deg, #c8c0a5, #6B7268);
    margin-bottom: 18px;
    position: relative;
  }
  .team-photo .initial {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 64px;
    color: rgba(255,255,255,0.7);
  }
  .team-name {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 28px;
    line-height: 1;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .team-role {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    color: #6F6F6F;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 12px;
  }
  .team-bio { font-size: 13px; line-height: 1.5; color: #4A4F4B; }

  /* Calculator */
  .calculator {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(15,26,17,0.08);
    border-radius: 28px;
    padding: 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 36px;
    align-items: center;
  }
  @media (max-width: 760px) { .calculator { grid-template-columns: 1fr; padding: 28px; } }
  .calc-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 18px;
  }
  .calc-group label {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #6F6F6F;
  }
  .calc-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .calc-option {
    padding: 10px 16px;
    border-radius: 9999px;
    border: 1px solid rgba(15,26,17,0.15);
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
    color: #0F1A11;
  }
  .calc-option:hover { border-color: #0F1A11; }
  .calc-option.active { background: #0F1A11; color: #fff; border-color: #0F1A11; }
  .calc-slider {
    width: 100%;
    -webkit-appearance: none;
    height: 2px;
    background: rgba(15,26,17,0.15);
    border-radius: 2px;
    outline: none;
  }
  .calc-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 9999px;
    background: #2E7A4F;
    cursor: grab;
    border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(46,122,79,0.3);
  }
  .calc-slider::-moz-range-thumb {
    width: 22px; height: 22px;
    border-radius: 9999px;
    background: #2E7A4F;
    cursor: grab;
    border: 3px solid #fff;
  }
  .calc-display {
    background: linear-gradient(135deg, #0F1A11 0%, #1a3520 100%);
    color: #fff;
    border-radius: 22px;
    padding: 36px 32px;
    position: relative;
    overflow: hidden;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .calc-display::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 80% 20%, rgba(196,154,43,0.18) 0%, transparent 60%);
    pointer-events: none;
  }
  .calc-display .calc-label {

// ── Hero video with fade-loop ─────────────────────────────
function HeroVideo() {
  const videoRef = useRef(null);
  useEffect(() => {
    const video = videoRef.current;
    if (!video) return;
    const FADE = 0.5;
    let rafId = null, resetTimer = null, stopped = false;

    const tick = () => {
      if (stopped) return;
      const d = video.duration, t = video.currentTime;
      if (d && !isNaN(d)) {
        let op = 1;
        if (t < FADE) op = Math.max(0, Math.min(1, t / FADE));
        else if (t > d - FADE) op = Math.max(0, Math.min(1, (d - t) / FADE));
        video.style.opacity = String(op);
      }
      rafId = requestAnimationFrame(tick);
    };
    const onEnded = () => {
      video.style.opacity = '0';
      resetTimer = setTimeout(() => { video.currentTime = 0; video.play().catch(()=>{}); }, 100);
    };
    const onLoaded = () => { video.play().catch(()=>{}); rafId = requestAnimationFrame(tick); };
    video.addEventListener('loadedmetadata', onLoaded);
    video.addEventListener('ended', onEnded);
    if (video.readyState >= 1) onLoaded();
    return () => {
      stopped = true;
      if (rafId) cancelAnimationFrame(rafId);
      if (resetTimer) clearTimeout(resetTimer);
      video.removeEventListener('loadedmetadata', onLoaded);
      video.removeEventListener('ended', onEnded);
    };
  }, []);
  return (
    <video ref={videoRef} src={VIDEO_SRC} muted playsInline preload="auto" crossOrigin="anonymous" />
  );
}

// ── Reveal-on-scroll wrapper ─────────────────────────────
function Reveal({ children, delay = 0, className = '' }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          setTimeout(() => el.classList.add('is-visible'), delay);
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    io.observe(el);
    return () => io.disconnect();
  }, [delay]);
  return <div ref={ref} className={`reveal ${className}`}>{children}</div>;
}

// ── Sticky scroll-aware nav + section highlight ──────────
function useScrollSpy(ids, offset = 120) {
  const [active, setActive] = useState(ids[0]);
  useEffect(() => {
    const handler = () => {
      const y = window.scrollY + offset;
      let current = ids[0];
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= y) current = id;
      }
      setActive(current);
    };
    handler();
    window.addEventListener('scroll', handler, { passive: true });
    return () => window.removeEventListener('scroll', handler);
  }, [ids.join(','), offset]);
  return active;
}

function useScrolled(threshold = 60) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const handler = () => setScrolled(window.scrollY > threshold);
    handler();
    window.addEventListener('scroll', handler, { passive: true });
    return () => window.removeEventListener('scroll', handler);
  }, [threshold]);
  return scrolled;
}

// ── Magnetic hover ───────────────────────────────────────
function useMagnetic(strength = 8) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width - 0.5) * strength;
      const y = ((e.clientY - r.top) / r.height - 0.5) * strength;
      el.style.transform = `translate(${x}px, ${y}px)`;
    };
    const onLeave = () => { el.style.transform = ''; };
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => { el.removeEventListener('mousemove', onMove); el.removeEventListener('mouseleave', onLeave); };
  }, [strength]);
  return ref;
}

function Calculator() {
  const [type, setType]       = useState('privat');   // privat | büro | endreinigung
  const [size, setSize]       = useState(85);          // m²
  const [frequency, setFreq]  = useState('woche');     // woche | 2wochen | monat | einmal

  // Base rates per m² (CHF), tuned per type
  const rates = {
    privat:       { perM2: 0.55, base: 38, mult: { woche: 0.9, '2wochen': 1.0, monat: 1.15, einmal: 1.35 } },
    buero:        { perM2: 0.48, base: 36, mult: { woche: 0.85, '2wochen': 0.95, monat: 1.1, einmal: 1.4 } },
    endreinigung: { perM2: 1.20, base: 180, mult: { woche: 1, '2wochen': 1, monat: 1, einmal: 1 } },
  };
  const r = rates[type === 'büro' ? 'buero' : type];
  const raw = (r.base + size * r.perM2) * r.mult[type === 'endreinigung' ? 'einmal' : frequency];
  const price = Math.round(raw / 5) * 5;
  const yearly = frequency === 'woche' ? price * 52 : frequency === '2wochen' ? price * 26 : frequency === 'monat' ? price * 12 : price;

  return (
    <section className="frost-cream py-28 md:py-36">

          eyebrow="05 / Kalkulator"
          title={<>Festpreis<br/>in <em>10 Sekunden.</em></>}

              <div className="calc-group">
                <label>Was soll gereinigt werden?</label>
                <div className="calc-options">
                  {[
                    { v: 'privat',       l: 'Privat' },
                    { v: 'büro',         l: 'Büro / Praxis' },
                    { v: 'endreinigung', l: 'Endreinigung' },
                  ].map(o => (
                    <button key={o.v} className={`calc-option ${type === o.v ? 'active' : ''}`} onClick={() => setType(o.v)}>{o.l}</button>
                  ))}
                </div>
              </div>

              <div className="calc-group">

                <div className="flex justify-between text-[10px] font-mono uppercase" style={{ color: '#6F6F6F' }}>
                  <span>30 m²</span><span>300 m²</span>
                </div>
              </div>

              {type !== 'endreinigung' && (
                <div className="calc-group">
                  <label>Wie oft?</label>
                  <div className="calc-options">
                    {[
                      { v: 'woche',    l: 'Wöchentlich' },
                      { v: '2wochen',  l: '2-wöchentlich' },
                      { v: 'monat',    l: 'Monatlich' },
                      { v: 'einmal',   l: 'Einmalig' },
                    ].map(o => (
                      <button key={o.v} className={`calc-option ${frequency === o.v ? 'active' : ''}`} onClick={() => setFreq(o.v)}>{o.l}</button>
